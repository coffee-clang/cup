# Official install selection policy. Defaults are scoped by host, target
# and component; profiles use the effective scoped selection, while curated
# toolchains always select their explicit tools.
format=1

# linux-arm64 -> linux-arm64
default.linux-arm64.linux-arm64.compiler=clang
default.linux-arm64.linux-arm64.debugger=lldb
default.linux-arm64.linux-arm64.linker=lld
default.linux-arm64.linux-arm64.formatter=clang-format
default.linux-arm64.linux-arm64.linter=clang-tidy
default.linux-arm64.linux-arm64.language-server=clangd
default.linux-arm64.linux-arm64.analyzer=valgrind

# linux-x64 -> linux-x64
default.linux-x64.linux-x64.compiler=clang
default.linux-x64.linux-x64.debugger=lldb
default.linux-x64.linux-x64.linker=lld
default.linux-x64.linux-x64.formatter=clang-format
default.linux-x64.linux-x64.linter=clang-tidy
default.linux-x64.linux-x64.language-server=clangd
default.linux-x64.linux-x64.analyzer=valgrind

# linux-x64 -> windows-x64
default.linux-x64.windows-x64.compiler=gcc

# macos-arm64 -> macos-arm64
default.macos-arm64.macos-arm64.compiler=clang
default.macos-arm64.macos-arm64.debugger=lldb
default.macos-arm64.macos-arm64.linker=lld
default.macos-arm64.macos-arm64.formatter=clang-format
default.macos-arm64.macos-arm64.linter=clang-tidy
default.macos-arm64.macos-arm64.language-server=clangd

# macos-x64 -> macos-x64
default.macos-x64.macos-x64.compiler=clang
default.macos-x64.macos-x64.debugger=lldb
default.macos-x64.macos-x64.linker=lld
default.macos-x64.macos-x64.formatter=clang-format
default.macos-x64.macos-x64.linter=clang-tidy
default.macos-x64.macos-x64.language-server=clangd

# windows-x64 -> windows-x64
default.windows-x64.windows-x64.compiler=clang
default.windows-x64.windows-x64.debugger=lldb
default.windows-x64.windows-x64.linker=lld
default.windows-x64.windows-x64.formatter=clang-format
default.windows-x64.windows-x64.linter=clang-tidy
default.windows-x64.windows-x64.language-server=clangd

profile.minimal=compiler,linker
profile.standard=compiler,linker,debugger,language-server
profile.extended=compiler,linker,debugger,language-server,formatter,linter

toolchain.llvm=clang,lldb,lld,clang-format,clang-tidy,clangd
toolchain.gnu=gcc,gdb,ld
