name: Build cup

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "include/**"
      - "Makefile"
      - "config/packages.cfg"
      - "certs/**"
      - "scripts/certs/update-ca-bundle.sh"
      - "scripts/bootstrap/bootstrap-common.sh"
      - "scripts/bootstrap/bootstrap-linux-deps.sh"
      - "scripts/bootstrap/bootstrap-macos-deps.sh"
      - "scripts/bootstrap/bootstrap-windows-deps.sh"
      - "scripts/install/install-cup.sh"
      - "scripts/install/install-cup-windows.ps1"
      - "scripts/install/uninstall-cup.sh"
      - "scripts/install/uninstall-cup-windows.ps1"
      - ".github/workflows/build-cup.yml"

  workflow_dispatch:
    inputs:
      publish:
        description: "Upload assets to the cup-bootstrap GitHub Release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  linux:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    env:
      PLATFORM: ${{ matrix.platform }}
      LINK_MODE: static
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ca-certificates curl file make perl pkg-config tar xz-utils zlib1g-dev
      - name: Bootstrap static dependencies
        run: bash scripts/bootstrap/bootstrap-linux-deps.sh
      - name: Build cup
        run: make PLATFORM="$PLATFORM" LINK_MODE="$LINK_MODE"
      - name: Prepare assets
        run: |
          mkdir -p dist
          cp "build/$PLATFORM/$LINK_MODE/bin/cup" "dist/cup-$PLATFORM"
          cp scripts/install/uninstall-cup.sh dist/uninstall.sh
          chmod +x "dist/cup-$PLATFORM" dist/uninstall.sh
          (cd dist && sha256sum "cup-$PLATFORM" uninstall.sh > "SHA256SUMS.$PLATFORM")
          if [ "$PLATFORM" = "linux-x64" ]; then
            cp config/packages.cfg dist/packages.cfg
            cp scripts/install/install-cup.sh dist/install.sh
            chmod +x dist/install.sh
            (cd dist && sha256sum packages.cfg > SHA256SUMS.common)
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: cup-${{ matrix.platform }}-assets
          path: dist/*

  macos:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-x64
            runner: macos-15-intel
          - platform: macos-arm64
            runner: macos-15
    env:
      PLATFORM: ${{ matrix.platform }}
      LINK_MODE: static
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: |
          brew update
          for package in autoconf automake libtool pkg-config make curl xz; do
            brew list --formula "$package" >/dev/null 2>&1 || brew install "$package"
          done
      - name: Bootstrap static dependencies
        run: bash scripts/bootstrap/bootstrap-macos-deps.sh
      - name: Build cup
        run: make PLATFORM="$PLATFORM" LINK_MODE="$LINK_MODE"
      - name: Prepare assets
        run: |
          mkdir -p dist
          cp "build/$PLATFORM/$LINK_MODE/bin/cup" "dist/cup-$PLATFORM"
          cp scripts/install/uninstall-cup.sh dist/uninstall.sh
          chmod +x "dist/cup-$PLATFORM" dist/uninstall.sh
          (cd dist && shasum -a 256 "cup-$PLATFORM" uninstall.sh > "SHA256SUMS.$PLATFORM")
      - uses: actions/upload-artifact@v7
        with:
          name: cup-${{ matrix.platform }}-assets
          path: dist/*

  windows:
    name: Build windows-x64
    runs-on: ubuntu-latest
    env:
      PLATFORM: windows-x64
      LINK_MODE: static
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ca-certificates curl file make mingw-w64 perl pkg-config tar xz-utils zip
      - name: Bootstrap static dependencies
        run: bash scripts/bootstrap/bootstrap-windows-deps.sh
      - name: Build cup
        run: make PLATFORM="$PLATFORM" LINK_MODE="$LINK_MODE"
      - name: Prepare assets
        run: |
          mkdir -p dist
          cp "build/$PLATFORM/$LINK_MODE/bin/cup.exe" dist/cup-windows-x64.exe
          cp scripts/install/install-cup-windows.ps1 dist/install.ps1
          cp scripts/install/uninstall-cup-windows.ps1 dist/uninstall.ps1
          (cd dist && sha256sum cup-windows-x64.exe uninstall.ps1 > SHA256SUMS.windows-x64)
      - uses: actions/upload-artifact@v7
        with:
          name: cup-windows-x64-assets
          path: dist/*

  publish:
    name: Publish bootstrap release
    needs:
      - linux
      - macos
      - windows
    if: ${{ github.event_name == 'push' || inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: cup-bootstrap
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download all assets
        uses: actions/download-artifact@v7
        with:
          pattern: cup-*-assets
          path: dist
          merge-multiple: true
      - name: Verify expected assets
        run: |
          for asset in \
            cup-linux-x64 cup-linux-arm64 cup-macos-x64 cup-macos-arm64 cup-windows-x64.exe \
            packages.cfg install.sh install.ps1 uninstall.sh uninstall.ps1 SHA256SUMS.common \
            SHA256SUMS.linux-x64 SHA256SUMS.linux-arm64 SHA256SUMS.macos-x64 \
            SHA256SUMS.macos-arm64 SHA256SUMS.windows-x64; do
            test -f "dist/$asset" || { echo "Missing asset: $asset" >&2; exit 1; }
          done
      - name: Ensure release exists
        run: |
          if ! gh release view "$RELEASE_TAG" \
              --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GH_REPO" \
              --title "cup bootstrap" \
              --notes "Bootstrap assets for installing cup."
          fi

      - name: Upload one coherent asset set
        run: |
          gh release upload "$RELEASE_TAG" dist/* \
            --repo "$GH_REPO" \
            --clobber
