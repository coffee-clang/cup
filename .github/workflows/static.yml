name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.4.36
    steps:
      - uses: actions/checkout@v6
      - name: Install mdBook
        run: |
          curl -s https://api.github.com/repos/rust-lang/mdBook/releases/latest \
            | grep "browser_download_url.*linux" \
            | cut -d : -f 2,3 \
            | tr -d \" | grep unknown-linux-gnu.tar.gz | wget -qi -
          tar xf mdbook-v*.tar.gz
      - uses: actions/configure-pages@v5
      - name: Build documentation
        run: |
          make docs-assets
          ./mdbook build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
