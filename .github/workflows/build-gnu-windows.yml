name: Build GNU tool (Windows)

on:
  workflow_dispatch:
    inputs:
      tool:
        description: GNU tool to build
        required: true
        type: choice
        options:
          - gcc
          - gdb
      version:
        description: Tool version, or stable/latest
        required: true
        default: stable
      revision:
        description: Package revision for recipe-sensitive builds
        required: true
        default: '1'
      publish:
        description: Publish packages as GitHub Release assets
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            curl
            tar
            gzip
            bzip2
            xz
            zip
            unzip
            patch
            texinfo
            python
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-autotools

      - name: Build package
        run: |
          export CUP_BUILD_ENVIRONMENT=msys2-ucrt64
          bash scripts/build-gnu-package.sh \
            "${{ inputs.tool }}" \
            "${{ inputs.version }}" \
            windows-x64 \
            windows-x64 \
            "${{ inputs.revision }}"

      - name: Load release metadata
        id: release
        shell: bash
        run: |
          source dist/release.env
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.tag }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip --clobber
          else
            gh release create "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --title "$tag" \
              --notes "Automated cup build for $tag"
          fi
