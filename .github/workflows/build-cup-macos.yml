name: Build cup macOS

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "include/**"
      - "Makefile"
      - "config/packages.cfg"
      - "certs/**"
      - "scripts/certs/update-ca-bundle.sh"
      - "scripts/bootstrap/bootstrap-macos-deps.sh"
      - "scripts/install/install-cup.sh"
      - "scripts/install/uninstall-cup.sh"
      - ".github/workflows/build-cup-macos.yml"

  workflow_dispatch:
    inputs:
      publish:
        description: "Upload assets to the cup-bootstrap GitHub Release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  build-cup-macos:
    name: Build cup for ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-x64
            runner: macos-15-intel
          - platform: macos-arm64
            runner: macos-15

    env:
      PLATFORM: ${{ matrix.platform }}
      LINK_MODE: static
      RELEASE_TAG: cup-bootstrap

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install system build tools
        run: |
          brew update
          for package in autoconf automake libtool pkg-config make curl xz; do
            if brew list --formula "$package" >/dev/null 2>&1; then
              echo "$package already installed"
            else
              brew install "$package"
            fi
          done

      - name: Bootstrap macOS static dependencies
        run: |
          bash scripts/bootstrap/bootstrap-macos-deps.sh

      - name: Build cup
        run: |
          make PLATFORM="$PLATFORM" LINK_MODE="$LINK_MODE"

      - name: Prepare release assets
        run: |
          mkdir -p dist

          cp "build/$PLATFORM/bin/cup" "dist/cup-$PLATFORM"
          chmod +x "dist/cup-$PLATFORM"

          shasum -a 256 "dist/cup-$PLATFORM" > "dist/SHA256SUMS.$PLATFORM"

      - name: Upload workflow artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == 'false' }}
        uses: actions/upload-artifact@v6
        with:
          name: cup-${{ matrix.platform }}-assets
          path: dist/*

      - name: Ensure release exists
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" \
              --title "cup bootstrap" \
              --notes "Bootstrap assets for installing cup." || true
          fi

      - name: Upload release assets
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" dist/* --clobber
