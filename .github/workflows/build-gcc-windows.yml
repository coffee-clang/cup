name: Build GCC (Windows host)

on:
  workflow_dispatch:
    inputs:
      version:
        description: GCC version, or stable/latest
        required: true
        default: stable
      revision:
        description: Package revision for recipe-sensitive builds
        required: true
        default: '1'
      publish:
        description: Publish packages as GitHub Release assets
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            curl
            tar
            gzip
            bzip2
            xz
            zip
            unzip
            patch
            texinfo
            python
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-binutils
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-autotools
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gmp
            mingw-w64-ucrt-x86_64-mpfr
            mingw-w64-ucrt-x86_64-mpc
            mingw-w64-ucrt-x86_64-isl
            mingw-w64-ucrt-x86_64-zstd
            mingw-w64-ucrt-x86_64-xz

      - name: Build package
        run: |
          export CUP_BUILD_ENVIRONMENT=msys2-ucrt64
          bash scripts/build-gcc.sh \
            "${{ inputs.version }}" \
            windows-x64 \
            windows-x64 \
            "${{ inputs.revision }}"

      - name: Test packaged GCC
        shell: pwsh
        run: |
          $packageBase = (Get-Content dist/release.env | Where-Object { $_ -like 'package_base=*' }) -replace '^package_base=', ''
          if (-not $packageBase) { throw 'package_base not found in dist/release.env' }

          Remove-Item -Recurse -Force dist/package-test -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force dist/package-test | Out-Null
          Expand-Archive -Force "dist/$packageBase.zip" dist/package-test

          $root = Join-Path (Resolve-Path dist/package-test) $packageBase
          $env:Path = "$env:SystemRoot\System32;$env:SystemRoot"

          & "$root\bin\gcc.exe" --version
          & "$root\bin\x86_64-w64-mingw32-gcc.exe" --version

          $testSource = @(
            '#include <stdio.h>',
            '',
            'int main(void) {',
            '    printf("hello gcc windows\n");',
            '    return 0;',
            '}'
          )
          $testSource | Set-Content "$env:TEMP\cup-gcc-windows-test.c"

          & "$root\bin\gcc.exe" "$env:TEMP\cup-gcc-windows-test.c" -o "$env:TEMP\cup-gcc-windows-test.exe"
          & "$env:TEMP\cup-gcc-windows-test.exe"

      - name: Load release metadata
        id: release
        shell: bash
        run: |
          source dist/release.env
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.tag }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip --clobber
          else
            gh release create "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --title "$tag" \
              --notes "Automated cup build for $tag"
          fi
