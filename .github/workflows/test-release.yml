name: Test release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run source tests or test a release candidate artifact"
        required: true
        default: source
        type: choice
        options:
          - source
          - candidate
      build_run_id:
        description: "Build release run id, required when mode is candidate"
        required: false
  workflow_run:
    workflows: ["Build release"]
    types: [completed]

permissions:
  actions: read
  contents: write

concurrency:
  group: test-release-${{ github.event_name }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve test mode
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.resolve.outputs.mode }}
      build_run_id: ${{ steps.resolve.outputs.build_run_id }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = workflow_run ]; then
            echo "mode=candidate" >> "$GITHUB_OUTPUT"
            echo "build_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "source_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            mode="${{ github.event.inputs.mode }}"
            echo "mode=$mode" >> "$GITHUB_OUTPUT"
            echo "source_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            if [ "$mode" = candidate ]; then
              build_run_id="${{ github.event.inputs.build_run_id }}"
              if [ -z "$build_run_id" ]; then
                echo "build_run_id is required when mode=candidate" >&2
                exit 2
              fi
              echo "build_run_id=$build_run_id" >> "$GITHUB_OUTPUT"
            else
              echo "build_run_id=" >> "$GITHUB_OUTPUT"
            fi
          fi

  source-posix:
    name: Source tests (${{ matrix.platform }})
    needs: resolve
    if: needs.resolve.outputs.mode == 'source'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.source_ref }}
          fetch-depth: 0
      - name: Run source tests
        env:
          PLATFORM: ${{ matrix.platform }}
          FAMILY: ${{ matrix.family }}
        run: scripts/tests/workflow/source-posix.sh

  source-windows:
    name: Source tests (windows-x64)
    needs: resolve
    if: needs.resolve.outputs.mode == 'source'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.source_ref }}
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            make
            perl
            tar
          pacboy: >-
            gcc:p
            binutils:p
            curl:p
            libarchive:p
            argtable3:p
            pkgconf:p
      - name: Prepare Windows test-only dependencies
        shell: msys2 {0}
        run: bash scripts/tests/workflow/source-windows-deps.sh /ucrt64
      - name: Run source tests
        shell: msys2 {0}
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/tests/workflow/source-windows.ps1

  candidate-info:
    name: Resolve release candidate metadata
    needs: resolve
    if: needs.resolve.outputs.mode == 'candidate'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      tag: ${{ steps.info.outputs.tag }}
      sha: ${{ steps.info.outputs.sha }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          run-id: ${{ needs.resolve.outputs.build_run_id }}
          github-token: ${{ github.token }}
          pattern: cup-release-*
          path: candidate
          merge-multiple: true
      - id: info
        run: scripts/tests/workflow/candidate-info.sh candidate

  native-test:
    name: Test release asset (${{ matrix.platform }})
    needs: [resolve, candidate-info]
    if: needs.resolve.outputs.mode == 'candidate'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: posix
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: posix
          - platform: macos-x64
            runner: macos-15-intel
            family: posix
          - platform: macos-arm64
            runner: macos-15
            family: posix
          - platform: windows-x64
            runner: windows-latest
            family: windows
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.candidate-info.outputs.sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          run-id: ${{ needs.resolve.outputs.build_run_id }}
          github-token: ${{ github.token }}
          pattern: cup-release-*
          path: release
          merge-multiple: true
      - name: Test POSIX release candidate
        if: matrix.family == 'posix'
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ needs.candidate-info.outputs.version }}
        run: scripts/tests/release/posix.sh release
      - name: Test Windows release candidate
        if: matrix.family == 'windows'
        shell: powershell
        run: >-
          powershell.exe -NoProfile -ExecutionPolicy Bypass
          -File scripts/tests/release/windows.ps1
          -ReleaseDir release
          -Version '${{ needs.candidate-info.outputs.version }}'

  publish:
    name: Publish release
    needs: [resolve, candidate-info, native-test]
    if: needs.resolve.outputs.mode == 'candidate'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      VERSION: ${{ needs.candidate-info.outputs.version }}
      TAG: ${{ needs.candidate-info.outputs.tag }}
      SHA: ${{ needs.candidate-info.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.candidate-info.outputs.sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          run-id: ${{ needs.resolve.outputs.build_run_id }}
          github-token: ${{ github.token }}
          pattern: cup-release-*
          path: dist
          merge-multiple: true
      - name: Publish verified release
        run: scripts/tests/workflow/release-publish.sh dist
