name: Build GDB (Linux)

on:
  workflow_dispatch:
    inputs:
      version:
        description: GDB version, or stable/latest
        required: true
        default: stable
      revision:
        description: Package revision metadata
        required: true
        default: '1'
      publish:
        description: Publish packages as GitHub Release assets
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -f docker/toolchain-builder.Dockerfile -t cup-gnu-builder .

      - name: Build package
        run: |
          docker run --rm \
            -e CUP_BUILD_ENVIRONMENT=docker-gnu \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-gnu-builder \
            bash scripts/build-gdb.sh \
              "${{ inputs.version }}" \
              linux-x64 \
              linux-x64 \
              "${{ inputs.revision }}"

      - name: Test packaged GDB
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-gnu-builder \
            bash -lc '
              set -euo pipefail
              source dist/release.env

              rm -rf dist/package-test
              mkdir -p dist/package-test
              tar -xJf "dist/$package_base.tar.xz" -C dist/package-test

              root="dist/package-test/$package_base"
              "$root/bin/gdb" --version
              "$root/bin/gdb" --configuration

              "$root/bin/gdb" -q -batch \
                -ex "python import sys; print(\"python-ok\", sys.version_info[0], sys.version_info[1])" | tee /tmp/cup-gdb-python-output.txt
              grep -F "python-ok" /tmp/cup-gdb-python-output.txt

              printf "%s\n" \
                "#include <stdio.h>" \
                "" \
                "static int add(int a, int b) {" \
                "    return a + b;" \
                "}" \
                "" \
                "int main(void) {" \
                "    int x = add(20, 22);" \
                "    printf(\"x = %d\\n\", x);" \
                "    return 0;" \
                "}" > /tmp/cup-gdb-test.c

              gcc -g -O0 /tmp/cup-gdb-test.c -o /tmp/cup-gdb-test
              "$root/bin/gdb" -q -batch \
                -ex "file /tmp/cup-gdb-test" \
                -ex "break add" \
                -ex "run" \
                -ex "print a" \
                -ex "print b" \
                -ex "backtrace" | tee /tmp/cup-gdb-output.txt

              grep -F '\''$1 = 20'\'' /tmp/cup-gdb-output.txt
              grep -F '\''$2 = 22'\'' /tmp/cup-gdb-output.txt
            '

      - name: Load release metadata
        id: release
        shell: bash
        run: |
          source dist/release.env
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.tag }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip --clobber
          else
            gh release create "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --title "$tag" \
              --notes "Automated cup build for $tag"
          fi
