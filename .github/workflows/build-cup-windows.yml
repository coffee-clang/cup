name: Build cup Windows

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "include/**"
      - "Makefile"
      - "config/packages.cfg"
      - "scripts/bootstrap-windows-deps.sh"
      - "scripts/install-cup-windows.ps1"
      - "scripts/uninstall-cup-windows.ps1"
      - ".github/workflows/build-cup-windows.yml"

  workflow_dispatch:
    inputs:
      publish:
        description: "Upload assets to the cup-bootstrap GitHub Release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  build-cup-windows:
    name: Build cup for windows-x64
    runs-on: ubuntu-latest

    env:
      PLATFORM: windows-x64
      LINK_MODE: static
      RELEASE_TAG: cup-bootstrap

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            file \
            make \
            mingw-w64 \
            perl \
            pkg-config \
            tar \
            xz-utils \
            zip

      - name: Bootstrap Windows static dependencies
        run: |
          chmod +x scripts/bootstrap-windows-deps.sh
          scripts/bootstrap-windows-deps.sh

      - name: Build cup
        run: |
          make PLATFORM="$PLATFORM" LINK_MODE="$LINK_MODE"

      - name: Prepare release assets
        run: |
          mkdir -p dist

          cp "build/$PLATFORM/bin/cup.exe" dist/cup-windows-x64.exe

          cp config/packages.cfg dist/packages.cfg

          cp scripts/install-cup-windows.ps1 dist/install.ps1

          cp scripts/uninstall-cup-windows.ps1 dist/uninstall.ps1

          sha256sum \
            dist/cup-windows-x64.exe \
            dist/packages.cfg \
            dist/install.ps1 \
            dist/uninstall.ps1 > dist/SHA256SUMS.windows

      - name: Upload workflow artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == 'false' }}
        uses: actions/upload-artifact@v6
        with:
          name: cup-windows-x64-assets
          path: |
            dist/cup-windows-x64.exe
            dist/packages.cfg
            dist/install.ps1
            dist/uninstall.ps1
            dist/SHA256SUMS.windows

      - name: Ensure release exists
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" \
              --title "cup bootstrap" \
              --notes "Bootstrap assets for installing cup."
          fi

      - name: Upload release assets
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/cup-windows-x64.exe \
            dist/packages.cfg \
            dist/install.ps1 \
            dist/uninstall.ps1 \
            dist/SHA256SUMS.windows \
            --clobber