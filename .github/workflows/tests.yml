# Build and verify one exact main-branch revision. Release artifacts remain
# internal to this workflow until release.yml publishes the same successful run.

name: Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cup-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Resolve tested revision
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}
      sha: ${{ steps.prepare.outputs.sha }}
      should_release: ${{ steps.prepare.outputs.should_release }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - id: prepare
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPOSITORY: coffee-clang/cup
        run: scripts/release/prepare.sh
      - name: Store release decision
        env:
          VERSION: ${{ steps.prepare.outputs.version }}
          TAG: ${{ steps.prepare.outputs.tag }}
          SHA: ${{ steps.prepare.outputs.sha }}
          SHOULD_RELEASE: ${{ steps.prepare.outputs.should_release }}
        run: scripts/release/decision-assets.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cup-release-decision
          path: dist/decision/*
          if-no-files-found: error
          retention-days: 30

  posix:
    name: Source tests (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Run source tests
        env:
          PLATFORM: ${{ matrix.platform }}
          FAMILY: ${{ matrix.family }}
        run: scripts/ci/source-posix.sh

  windows:
    name: Source tests (windows-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: UCRT64
          update: true
          install: >-
            ca-certificates
            curl
            file
            git
            make
            perl
            tar
            xz
          pacboy: >-
            gcc:p
            binutils:p
            pkgconf:p
      - name: Build pinned Windows dependencies
        shell: msys2 {0}
        run: JOBS=4 make PLATFORM=windows-x64 deps
      - name: Run source tests
        shell: msys2 {0}
        run: >-
          powershell.exe -NoProfile -ExecutionPolicy Bypass
          -File scripts/ci/source-windows.ps1

  coverage:
    name: Coverage gate (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Prepare coverage environment
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ca-certificates curl file gcovr git make perl \
            pkg-config tar xz-utils
          make PLATFORM=linux-x64 deps
      - name: Collect coverage
        env:
          PLATFORM: linux-x64
          CUP_TEST_PLATFORM: linux-x64
          CUP_COVERAGE_MIN_LINES: 85
          CUP_COVERAGE_MIN_BRANCHES: 70
          CUP_COVERAGE_MIN_FUNCTIONS: 97
        run: tests/runners/coverage.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: cup-coverage-linux-x64
          path: build/coverage/*
          if-no-files-found: warn
          retention-days: 30

  sanitizers:
    name: Address and undefined behavior sanitizers (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Prepare sanitizer environment
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ca-certificates curl file git make perl \
            pkg-config tar xz-utils
          make PLATFORM=linux-x64 deps
      - name: Run sanitizer tests
        env:
          PLATFORM: linux-x64
          CUP_TEST_PLATFORM: linux-x64
        run: tests/runners/sanitizers.sh

  common-assets:
    name: Prepare common release candidate assets
    needs: prepare
    if: needs.prepare.outputs.should_release == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - name: Prepare common assets
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ needs.prepare.outputs.sha }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          TESTS_RUN_ID: ${{ github.run_id }}
          TESTS_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: scripts/release/common-assets.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cup-release-common
          path: dist/common/*
          if-no-files-found: error
          retention-days: 30

  build-release:
    name: Build static candidate (${{ matrix.platform }})
    needs: prepare
    if: needs.prepare.outputs.should_release == '1'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
          - platform: windows-x64
            runner: windows-latest
            family: windows
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        if: matrix.family == 'windows'
        with:
          msystem: UCRT64
          update: true
          install: >-
            ca-certificates
            curl
            file
            git
            make
            perl
            tar
            xz
            zip
          pacboy: >-
            gcc:p
            binutils:p
            pkgconf:p
      - name: Build POSIX release candidate
        if: matrix.family != 'windows'
        env:
          PLATFORM: ${{ matrix.platform }}
          FAMILY: ${{ matrix.family }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: scripts/release/build-platform.sh
      - name: Build Windows release candidate
        if: matrix.family == 'windows'
        shell: msys2 {0}
        env:
          PLATFORM: ${{ matrix.platform }}
          FAMILY: ${{ matrix.family }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: scripts/release/build-platform.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cup-release-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}/*
          if-no-files-found: error
          retention-days: 30

  native-release-tests:
    name: Native candidate tests (${{ matrix.platform }})
    needs:
      - prepare
      - common-assets
      - build-release
    if: needs.prepare.outputs.should_release == '1'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: posix
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: posix
          - platform: macos-x64
            runner: macos-15-intel
            family: posix
          - platform: macos-arm64
            runner: macos-15
            family: posix
          - platform: windows-x64
            runner: windows-latest
            family: windows
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cup-release-*
          path: release
          merge-multiple: true
      - name: Test POSIX release candidate
        if: matrix.family == 'posix'
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: tests/release/posix.sh release
      - name: Test Windows release candidate
        if: matrix.family == 'windows'
        shell: powershell
        run: >-
          powershell.exe -NoProfile -ExecutionPolicy Bypass
          -File tests/release/windows.ps1
          -ReleaseDir release
          -Version '${{ needs.prepare.outputs.version }}'

  gate:
    name: Tests gate
    if: always()
    needs:
      - prepare
      - posix
      - windows
      - coverage
      - sanitizers
      - common-assets
      - build-release
      - native-release-tests
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        env:
          SHOULD_RELEASE: ${{ needs.prepare.outputs.should_release }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          POSIX_RESULT: ${{ needs.posix.result }}
          WINDOWS_RESULT: ${{ needs.windows.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          SANITIZERS_RESULT: ${{ needs.sanitizers.result }}
          COMMON_RESULT: ${{ needs.common-assets.result }}
          BUILD_RESULT: ${{ needs.build-release.result }}
          NATIVE_RESULT: ${{ needs.native-release-tests.result }}
        run: |
          set -euo pipefail
          for result in \
            "$PREPARE_RESULT" "$POSIX_RESULT" "$WINDOWS_RESULT" \
            "$COVERAGE_RESULT" "$SANITIZERS_RESULT"; do
            [ "$result" = success ] || {
              echo "A required source-test job did not succeed: $result" >&2
              exit 1
            }
          done
          if [ "$SHOULD_RELEASE" = 1 ]; then
            for result in "$COMMON_RESULT" "$BUILD_RESULT" "$NATIVE_RESULT"; do
              [ "$result" = success ] || {
                echo "A release-candidate job did not succeed: $result" >&2
                exit 1
              }
            done
          else
            for result in "$COMMON_RESULT" "$BUILD_RESULT" "$NATIVE_RESULT"; do
              [ "$result" = skipped ] || {
                echo "Unexpected release-candidate job result: $result" >&2
                exit 1
              }
            done
          fi
