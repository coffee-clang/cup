# Build and verify one exact main-branch revision. Release artifacts remain
# internal to this workflow until release.yml publishes the same successful run.

name: Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cup-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve the exact source revision and decide whether this run should assemble a candidate.
  prepare:
    name: Resolve tested revision
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}
      sha: ${{ steps.prepare.outputs.sha }}
      should_release: ${{ steps.prepare.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: prepare
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPOSITORY: coffee-clang/cup
        run: scripts/release/prepare.sh
      - name: Store release decision
        env:
          VERSION: ${{ steps.prepare.outputs.version }}
          TAG: ${{ steps.prepare.outputs.tag }}
          SHA: ${{ steps.prepare.outputs.sha }}
          SHOULD_RELEASE: ${{ steps.prepare.outputs.should_release }}
        run: scripts/release/decision-assets.sh
      - uses: actions/upload-artifact@v7
        with:
          name: cup-release-decision
          path: dist/decision/*
          if-no-files-found: error
          retention-days: 30

  # Run normal source tests on every native POSIX platform.
  posix:
    name: Source tests (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Prepare source-test toolchain
        env:
          FAMILY: ${{ matrix.family }}
          PLATFORM: ${{ matrix.platform }}
        run: scripts/ci/prepare-posix.sh source
      - id: dependency-id
        name: Resolve dependency identity
        run: echo "value=$(scripts/dependencies/verify.sh '${{ matrix.platform }}' --print-id)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/deps/${{ matrix.platform }}/install
          key: cup-source-${{ matrix.platform }}-${{ steps.dependency-id.outputs.value }}
      - name: Run source tests
        env:
          PLATFORM: ${{ matrix.platform }}
          FAMILY: ${{ matrix.family }}
          CUP_CI_ENVIRONMENT_PREPARED: 1
        run: scripts/ci/source-posix.sh

  # Keep the Windows source path native to the canonical UCRT64 toolchain.
  windows:
    name: Source tests (windows-x64)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            ca-certificates
            curl
            diffutils
            file
            git
            make
            perl
            tar
            xz
          pacboy: >-
            gcc:p
            binutils:p
            pkgconf:p
      - id: dependency-id
        name: Resolve dependency identity
        shell: msys2 {0}
        run: echo "value=$(scripts/dependencies/verify.sh windows-x64 --print-id)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: C:/msys64/home/runneradmin/deps/windows-x64/install
          key: cup-source-windows-x64-ucrt64-${{ steps.dependency-id.outputs.value }}
      - name: Build pinned Windows dependencies
        shell: msys2 {0}
        run: |
          JOBS=4 make PLATFORM=windows-x64 deps
          make PLATFORM=windows-x64 check-dependencies
      - name: Run source tests
        shell: msys2 {0}
        run: >-
          powershell.exe -NoProfile -ExecutionPolicy Bypass
          -File scripts/ci/source-windows.ps1

  # Coverage runs natively so platform-specific C branches contribute to the gate.
  coverage:
    name: Coverage gate (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 110
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
          - platform: windows-x64
            runner: windows-latest
            family: windows
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        if: matrix.family == 'windows'
        with:
          msystem: UCRT64
          update: true
          install: >-
            ca-certificates
            coreutils
            curl
            diffutils
            file
            git
            make
            perl
            tar
            xz
          pacboy: >-
            gcc:p
            binutils:p
            gcovr:p
            pkgconf:p
      - name: Prepare POSIX coverage toolchain
        if: matrix.family != 'windows'
        env:
          FAMILY: ${{ matrix.family }}
          PLATFORM: ${{ matrix.platform }}
        run: scripts/ci/prepare-posix.sh coverage
      - id: dependency-id-posix
        name: Resolve POSIX dependency identity
        if: matrix.family != 'windows'
        run: echo "value=$(scripts/dependencies/verify.sh '${{ matrix.platform }}' --print-id)" >> "$GITHUB_OUTPUT"
      - id: dependency-id-windows
        name: Resolve Windows dependency identity
        if: matrix.family == 'windows'
        shell: msys2 {0}
        run: echo "value=$(scripts/dependencies/verify.sh windows-x64 --print-id)" >> "$GITHUB_OUTPUT"
      - name: Restore POSIX dependency cache
        if: matrix.family != 'windows'
        uses: actions/cache@v4
        with:
          path: ~/deps/${{ matrix.platform }}/install
          key: cup-coverage-${{ matrix.platform }}-${{ steps.dependency-id-posix.outputs.value }}
      - name: Restore Windows dependency cache
        if: matrix.family == 'windows'
        uses: actions/cache@v4
        with:
          path: C:/msys64/home/runneradmin/deps/windows-x64/install
          key: cup-coverage-windows-x64-ucrt64-${{ steps.dependency-id-windows.outputs.value }}
      - name: Prepare POSIX coverage dependencies
        if: matrix.family != 'windows'
        run: |
          JOBS=4 make PLATFORM='${{ matrix.platform }}' deps
          make PLATFORM='${{ matrix.platform }}' check-dependencies
      - name: Prepare Windows coverage dependencies
        if: matrix.family == 'windows'
        shell: msys2 {0}
        run: |
          JOBS=4 make PLATFORM=windows-x64 deps
          make PLATFORM=windows-x64 check-dependencies
      - name: Collect POSIX coverage
        if: matrix.family != 'windows'
        env:
          PLATFORM: ${{ matrix.platform }}
          CUP_TEST_PLATFORM: ${{ matrix.platform }}
          CUP_COVERAGE_MIN_LINES: 85
          CUP_COVERAGE_MIN_BRANCHES: 70
          CUP_COVERAGE_MIN_FUNCTIONS: 97
        run: tests/runners/coverage.sh
      - name: Collect Windows coverage
        if: matrix.family == 'windows'
        shell: msys2 {0}
        env:
          PLATFORM: windows-x64
          CUP_TEST_PLATFORM: windows-x64
          CUP_COVERAGE_MIN_LINES: 85
          CUP_COVERAGE_MIN_BRANCHES: 70
          CUP_COVERAGE_MIN_FUNCTIONS: 97
        run: tests/runners/coverage.sh
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cup-coverage-${{ matrix.platform }}
          path: build/coverage/${{ matrix.platform }}/*
          if-no-files-found: warn
          retention-days: 30

  # ASan/UBSan run natively; leak detection is enabled on Linux and macOS.
  sanitizers:
    name: Address and undefined behavior sanitizers (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 110
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
          - platform: windows-x64
            runner: windows-latest
            family: windows
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        if: matrix.family == 'windows'
        with:
          msystem: CLANG64
          update: true
          install: >-
            ca-certificates
            coreutils
            curl
            diffutils
            file
            git
            make
            perl
            tar
            xz
          pacboy: >-
            clang:p
            compiler-rt:p
            llvm:p
            pkgconf:p
      - name: Prepare POSIX sanitizer toolchain
        if: matrix.family != 'windows'
        env:
          FAMILY: ${{ matrix.family }}
          PLATFORM: ${{ matrix.platform }}
        run: scripts/ci/prepare-posix.sh sanitizers
      - id: dependency-id-posix
        name: Resolve POSIX dependency identity
        if: matrix.family != 'windows'
        run: echo "value=$(scripts/dependencies/verify.sh '${{ matrix.platform }}' --print-id)" >> "$GITHUB_OUTPUT"
      - id: dependency-id-windows
        name: Resolve Windows dependency identity
        if: matrix.family == 'windows'
        shell: msys2 {0}
        run: echo "value=$(scripts/dependencies/verify.sh windows-x64 --print-id)" >> "$GITHUB_OUTPUT"
      - name: Restore POSIX dependency cache
        if: matrix.family != 'windows'
        uses: actions/cache@v4
        with:
          path: ~/deps/${{ matrix.platform }}/install
          key: cup-sanitizer-${{ matrix.platform }}-${{ steps.dependency-id-posix.outputs.value }}
      - name: Restore Windows CLANG64 dependency cache
        if: matrix.family == 'windows'
        uses: actions/cache@v4
        with:
          path: C:/msys64/home/runneradmin/deps/windows-x64-clang64/install
          key: cup-sanitizer-windows-x64-clang64-${{ steps.dependency-id-windows.outputs.value }}
      - name: Prepare POSIX sanitizer dependencies
        if: matrix.family != 'windows'
        run: |
          JOBS=4 make PLATFORM='${{ matrix.platform }}' deps
          make PLATFORM='${{ matrix.platform }}' check-dependencies
      - name: Prepare Windows sanitizer dependencies
        if: matrix.family == 'windows'
        shell: msys2 {0}
        run: |
          DEPS_PREFIX="$HOME/deps/windows-x64-clang64/install"
          export DEPS_PREFIX
          JOBS=4 make PLATFORM=windows-x64 DEPS_PREFIX="$DEPS_PREFIX" deps
          make PLATFORM=windows-x64 DEPS_PREFIX="$DEPS_PREFIX" check-dependencies
      - name: Run POSIX sanitizer tests
        if: matrix.family != 'windows'
        env:
          PLATFORM: ${{ matrix.platform }}
          CUP_TEST_PLATFORM: ${{ matrix.platform }}
          CC: clang
        run: tests/runners/sanitizers.sh
      - name: Run Windows sanitizer tests
        if: matrix.family == 'windows'
        shell: msys2 {0}
        env:
          PLATFORM: windows-x64
          CUP_TEST_PLATFORM: windows-x64
          CC: clang
        run: |
          export DEPS_PREFIX="$HOME/deps/windows-x64-clang64/install"
          tests/runners/sanitizers.sh
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cup-sanitizers-${{ matrix.platform }}
          path: build/sanitizers/${{ matrix.platform }}/*
          if-no-files-found: warn
          retention-days: 30

  # Candidate assembly starts only after normal tests and quality gates succeed.
  common-assets:
    name: Prepare common release candidate assets
    needs: prepare
    if: needs.prepare.outputs.should_release == '1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - name: Prepare common assets
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ needs.prepare.outputs.sha }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          TESTS_RUN_ID: ${{ github.run_id }}
          TESTS_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: scripts/release/common-assets.sh
      - uses: actions/upload-artifact@v7
        with:
          name: cup-release-common
          path: dist/common/*
          if-no-files-found: error
          retention-days: 30

  build-release:
    name: Build release candidate (${{ matrix.platform }})
    needs: prepare
    if: needs.prepare.outputs.should_release == '1'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 110
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
          - platform: windows-x64
            runner: windows-latest
            family: windows
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        if: matrix.family == 'windows'
        with:
          msystem: UCRT64
          update: true
          install: >-
            ca-certificates
            curl
            diffutils
            file
            git
            make
            perl
            tar
            xz
            zip
          pacboy: >-
            gcc:p
            binutils:p
            pkgconf:p
      - name: Prepare POSIX release toolchain
        if: matrix.family != 'windows'
        env:
          FAMILY: ${{ matrix.family }}
          PLATFORM: ${{ matrix.platform }}
        run: scripts/ci/prepare-posix.sh release
      - id: dependency-id-posix
        name: Resolve POSIX dependency identity
        if: matrix.family != 'windows'
        run: echo "value=$(scripts/dependencies/verify.sh '${{ matrix.platform }}' --print-id)" >> "$GITHUB_OUTPUT"
      - id: dependency-id-windows
        name: Resolve Windows dependency identity
        if: matrix.family == 'windows'
        shell: msys2 {0}
        run: echo "value=$(scripts/dependencies/verify.sh windows-x64 --print-id)" >> "$GITHUB_OUTPUT"
      - name: Restore POSIX dependency cache
        if: matrix.family != 'windows'
        uses: actions/cache@v4
        with:
          path: ~/deps/${{ matrix.platform }}/install
          key: cup-release-${{ matrix.platform }}-${{ steps.dependency-id-posix.outputs.value }}
      - name: Restore Windows dependency cache
        if: matrix.family == 'windows'
        uses: actions/cache@v4
        with:
          path: C:/msys64/home/runneradmin/deps/windows-x64/install
          key: cup-release-windows-x64-ucrt64-${{ steps.dependency-id-windows.outputs.value }}
      - name: Build POSIX release candidate
        if: matrix.family != 'windows'
        env:
          PLATFORM: ${{ matrix.platform }}
          FAMILY: ${{ matrix.family }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ needs.prepare.outputs.sha }}
          CUP_CI_ENVIRONMENT_PREPARED: 1
        run: scripts/release/build-platform.sh
      - name: Build Windows release candidate
        if: matrix.family == 'windows'
        shell: msys2 {0}
        env:
          PLATFORM: ${{ matrix.platform }}
          FAMILY: ${{ matrix.family }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: scripts/release/build-platform.sh
      - uses: actions/upload-artifact@v7
        with:
          name: cup-release-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}/*
          if-no-files-found: error
          retention-days: 30
      - uses: actions/upload-artifact@v7
        with:
          name: cup-symbols-${{ matrix.platform }}
          path: dist/symbols/${{ matrix.platform }}/*
          if-no-files-found: error
          retention-days: 30

  # Test the exact candidate executable on clean native runners without recompiling it.
  native-release-tests:
    name: Native candidate tests (${{ matrix.platform }})
    needs:
      - prepare
      - common-assets
      - build-release
    if: needs.prepare.outputs.should_release == '1'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: posix
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: posix
          - platform: macos-x64
            runner: macos-15-intel
            family: posix
          - platform: macos-arm64
            runner: macos-15
            family: posix
          - platform: windows-x64
            runner: windows-latest
            family: windows
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          pattern: cup-release-*
          path: release
          merge-multiple: true
      - name: Test POSIX release candidate
        if: matrix.family == 'posix'
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: tests/release/posix.sh release
      - name: Test Windows release candidate
        if: matrix.family == 'windows'
        shell: powershell
        run: >-
          powershell.exe -NoProfile -ExecutionPolicy Bypass
          -File tests/release/windows.ps1
          -ReleaseDir release
          -Version '${{ needs.prepare.outputs.version }}'

  # One final job exposes the complete workflow result to release.yml.
  gate:
    name: Tests gate
    if: always()
    needs:
      - prepare
      - posix
      - windows
      - coverage
      - sanitizers
      - common-assets
      - build-release
      - native-release-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify required jobs
        env:
          SHOULD_RELEASE: ${{ needs.prepare.outputs.should_release }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          POSIX_RESULT: ${{ needs.posix.result }}
          WINDOWS_RESULT: ${{ needs.windows.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          SANITIZERS_RESULT: ${{ needs.sanitizers.result }}
          COMMON_RESULT: ${{ needs.common-assets.result }}
          BUILD_RESULT: ${{ needs.build-release.result }}
          NATIVE_RESULT: ${{ needs.native-release-tests.result }}
        run: |
          set -euo pipefail
          for result in \
            "$PREPARE_RESULT" "$POSIX_RESULT" "$WINDOWS_RESULT" \
            "$COVERAGE_RESULT" "$SANITIZERS_RESULT"; do
            [ "$result" = success ] || {
              echo "A required source-test job did not succeed: $result" >&2
              exit 1
            }
          done
          if [ "$SHOULD_RELEASE" = 1 ]; then
            for result in "$COMMON_RESULT" "$BUILD_RESULT" "$NATIVE_RESULT"; do
              [ "$result" = success ] || {
                echo "A release-candidate job did not succeed: $result" >&2
                exit 1
              }
            done
          else
            for result in "$COMMON_RESULT" "$BUILD_RESULT" "$NATIVE_RESULT"; do
              [ "$result" = skipped ] || {
                echo "Unexpected release-candidate job result: $result" >&2
                exit 1
              }
            done
          fi
