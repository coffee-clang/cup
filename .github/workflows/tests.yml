name: Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: cup-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependencies:
    name: Prepare pinned dependencies
    uses: ./.github/workflows/dependencies.yml
    with:
      target: all

  quality:
    name: Repository quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: make quality

  posix:
    name: Source tests (${{ matrix.platform }})
    needs: dependencies
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 100
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Prepare source-test toolchain
        env:
          FAMILY: ${{ matrix.family }}
          PLATFORM: ${{ matrix.platform }}
        run: scripts/ci/prepare-posix.sh source
      - id: cache
        name: Resolve dependency cache
        run: |
          key=$(scripts/dependencies/verify.sh \
            '${{ matrix.platform }}' --print-cache-key)
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        with:
          path: ~/deps/${{ matrix.platform }}/install
          key: ${{ steps.cache.outputs.key }}
      - name: Run source tests
        env:
          PLATFORM: ${{ matrix.platform }}
          FAMILY: ${{ matrix.family }}
          CUP_CI_ENVIRONMENT_PREPARED: 1
        run: scripts/ci/source-posix.sh

  windows:
    name: Source tests (windows-x64)
    needs: dependencies
    runs-on: windows-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            ca-certificates
            curl
            diffutils
            file
            git
            make
            perl
            tar
            xz
          pacboy: >-
            gcc:p
            binutils:p
            pkgconf:p
      - id: cache
        name: Resolve dependency cache
        shell: msys2 {0}
        run: |
          prefix="$HOME/deps/windows-x64/install"
          key=$(scripts/dependencies/verify.sh windows-x64 --print-cache-key)
          echo "path=$(cygpath -m "$prefix")" >> "$GITHUB_OUTPUT"
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        with:
          path: ${{ steps.cache.outputs.path }}
          key: ${{ steps.cache.outputs.key }}
      - name: Run source tests
        shell: msys2 {0}
        run: >-
          powershell.exe -NoProfile -ExecutionPolicy Bypass
          -File scripts/ci/source-windows.ps1

  coverage:
    name: Coverage (${{ matrix.platform }})
    needs: dependencies
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
          - platform: windows-x64
            runner: windows-latest
            family: windows
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        if: matrix.family == 'windows'
        with:
          msystem: UCRT64
          update: true
          install: >-
            ca-certificates
            coreutils
            curl
            diffutils
            file
            git
            make
            perl
            tar
            xz
          pacboy: >-
            gcc:p
            binutils:p
            gcovr:p
            pkgconf:p
      - name: Prepare POSIX coverage toolchain
        if: matrix.family != 'windows'
        env:
          FAMILY: ${{ matrix.family }}
          PLATFORM: ${{ matrix.platform }}
        run: scripts/ci/prepare-posix.sh coverage
      - id: cache-posix
        if: matrix.family != 'windows'
        run: |
          key=$(scripts/dependencies/verify.sh \
            '${{ matrix.platform }}' --print-cache-key)
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - id: cache-windows
        if: matrix.family == 'windows'
        shell: msys2 {0}
        run: |
          prefix="$HOME/deps/windows-x64/install"
          key=$(scripts/dependencies/verify.sh windows-x64 --print-cache-key)
          echo "path=$(cygpath -m "$prefix")" >> "$GITHUB_OUTPUT"
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        if: matrix.family != 'windows'
        with:
          path: ~/deps/${{ matrix.platform }}/install
          key: ${{ steps.cache-posix.outputs.key }}
      - uses: actions/cache@v5
        if: matrix.family == 'windows'
        with:
          path: ${{ steps.cache-windows.outputs.path }}
          key: ${{ steps.cache-windows.outputs.key }}
      - name: Collect POSIX coverage
        if: matrix.family != 'windows'
        env:
          PLATFORM: ${{ matrix.platform }}
          CUP_TEST_PLATFORM: ${{ matrix.platform }}
          CUP_COVERAGE_MIN_LINES: 85
          CUP_COVERAGE_MIN_BRANCHES: 70
          CUP_COVERAGE_MIN_FUNCTIONS: 97
        run: tests/runners/coverage.sh
      - name: Collect Windows coverage
        if: matrix.family == 'windows'
        shell: msys2 {0}
        env:
          PLATFORM: windows-x64
          CUP_TEST_PLATFORM: windows-x64
          CUP_COVERAGE_MIN_LINES: 85
          CUP_COVERAGE_MIN_BRANCHES: 70
          CUP_COVERAGE_MIN_FUNCTIONS: 97
        run: tests/runners/coverage.sh
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cup-coverage-${{ matrix.platform }}
          path: build/coverage/${{ matrix.platform }}/*
          if-no-files-found: warn
          retention-days: 30

  sanitizers:
    name: Sanitizers (${{ matrix.platform }})
    needs: dependencies
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
          - platform: windows-x64
            runner: windows-latest
            family: windows
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        if: matrix.family == 'windows'
        with:
          msystem: CLANG64
          update: true
          install: >-
            ca-certificates
            coreutils
            curl
            diffutils
            file
            git
            make
            perl
            tar
            xz
          pacboy: >-
            clang:p
            compiler-rt:p
            llvm:p
            pkgconf:p
      - name: Prepare POSIX sanitizer toolchain
        if: matrix.family != 'windows'
        env:
          FAMILY: ${{ matrix.family }}
          PLATFORM: ${{ matrix.platform }}
        run: scripts/ci/prepare-posix.sh sanitizers
      - id: cache-posix
        if: matrix.family != 'windows'
        run: |
          key=$(scripts/dependencies/verify.sh \
            '${{ matrix.platform }}' --print-cache-key)
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - id: cache-windows
        if: matrix.family == 'windows'
        shell: msys2 {0}
        env:
          CUP_DEPENDENCY_PROFILE: clang64
        run: |
          prefix="$HOME/deps/windows-x64-clang64/install"
          key=$(scripts/dependencies/verify.sh windows-x64 --print-cache-key)
          echo "path=$(cygpath -m "$prefix")" >> "$GITHUB_OUTPUT"
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        if: matrix.family != 'windows'
        with:
          path: ~/deps/${{ matrix.platform }}/install
          key: ${{ steps.cache-posix.outputs.key }}
      - uses: actions/cache@v5
        if: matrix.family == 'windows'
        with:
          path: ${{ steps.cache-windows.outputs.path }}
          key: ${{ steps.cache-windows.outputs.key }}
      - name: Run POSIX sanitizer tests
        if: matrix.family != 'windows'
        env:
          PLATFORM: ${{ matrix.platform }}
          CUP_TEST_PLATFORM: ${{ matrix.platform }}
          CC: clang
        run: tests/runners/sanitizers.sh
      - name: Run Windows sanitizer tests
        if: matrix.family == 'windows'
        shell: msys2 {0}
        env:
          PLATFORM: windows-x64
          CUP_TEST_PLATFORM: windows-x64
          CUP_DEPENDENCY_PROFILE: clang64
          CC: clang
        run: tests/runners/sanitizers.sh
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cup-sanitizers-${{ matrix.platform }}
          path: build/sanitizers/${{ matrix.platform }}/*
          if-no-files-found: warn
          retention-days: 30

  gate:
    name: Tests gate
    if: always()
    needs:
      - dependencies
      - quality
      - posix
      - windows
      - coverage
      - sanitizers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify required jobs
        env:
          DEPENDENCIES_RESULT: ${{ needs.dependencies.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          POSIX_RESULT: ${{ needs.posix.result }}
          WINDOWS_RESULT: ${{ needs.windows.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          SANITIZERS_RESULT: ${{ needs.sanitizers.result }}
        run: |
          set -euo pipefail
          for result in \
            "$DEPENDENCIES_RESULT" "$QUALITY_RESULT" "$POSIX_RESULT" \
            "$WINDOWS_RESULT" "$COVERAGE_RESULT" "$SANITIZERS_RESULT"; do
            [ "$result" = success ] || {
              echo "A required test job did not succeed: $result" >&2
              exit 1
            }
          done
