name: Build GCC (Linux host)

on:
  workflow_dispatch:
    inputs:
      version:
        description: GCC version, or stable/latest
        required: true
        default: stable
      target_platform:
        description: GCC target platform
        required: true
        type: choice
        options:
          - linux-x64
          - windows-x64
      revision:
        description: Package revision for recipe-sensitive builds
        required: true
        default: '1'
      publish:
        description: Publish packages as GitHub Release assets
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -f docker/toolchain-builder.Dockerfile -t cup-gnu-builder .

      - name: Build package
        run: |
          docker run --rm \
            -e CUP_BUILD_ENVIRONMENT=docker-gnu \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-gnu-builder \
            bash scripts/build-gcc.sh \
              "${{ inputs.version }}" \
              linux-x64 \
              "${{ inputs.target_platform }}" \
              "${{ inputs.revision }}"

      - name: Test packaged GCC
        run: |
          docker run --rm \
            -e TARGET_PLATFORM="${{ inputs.target_platform }}" \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-gnu-builder \
            bash -lc '
              set -euo pipefail
              source dist/release.env

              rm -rf dist/package-test
              mkdir -p dist/package-test
              tar -xJf "dist/$package_base.tar.xz" -C dist/package-test

              root="dist/package-test/$package_base"

              if [ "$TARGET_PLATFORM" = "linux-x64" ]; then
                "$root/bin/gcc" --version
                "$root/bin/gcc" -print-libgcc-file-name
                "$root/bin/gcc" -print-prog-name=cc1

                printf "%s\n" \
                  "#include <stdio.h>" \
                  "" \
                  "int main(void) {" \
                  "    printf(\"hello gcc\\n\");" \
                  "    return 0;" \
                  "}" > /tmp/cup-gcc-test.c

                "$root/bin/gcc" /tmp/cup-gcc-test.c -o /tmp/cup-gcc-test
                /tmp/cup-gcc-test | grep "hello gcc"
              elif [ "$TARGET_PLATFORM" = "windows-x64" ]; then
                "$root/bin/x86_64-w64-mingw32-gcc" --version

                printf "%s\n" \
                  "int main(void) {" \
                  "    return 0;" \
                  "}" > /tmp/cup-gcc-windows-test.c

                "$root/bin/x86_64-w64-mingw32-gcc" /tmp/cup-gcc-windows-test.c -o /tmp/cup-gcc-windows-test.exe
                test -s /tmp/cup-gcc-windows-test.exe
                file /tmp/cup-gcc-windows-test.exe | grep -i "PE"
              else
                echo "unsupported target platform: $TARGET_PLATFORM" >&2
                exit 2
              fi
            '

      - name: Load release metadata
        id: release
        shell: bash
        run: |
          source dist/release.env
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.tag }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip --clobber
          else
            gh release create "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --title "$tag" \
              --notes "Automated cup build for $tag"
          fi
