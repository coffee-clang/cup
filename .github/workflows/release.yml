name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cup-release
  cancel-in-progress: false

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      sha: ${{ steps.metadata.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: metadata
        shell: bash
        run: |
          set -euo pipefail
          [ "$GITHUB_REF" = refs/heads/main ] || {
            echo "Release must be dispatched from main, got $GITHUB_REF" >&2
            exit 1
          }
          version=$(./scripts/version.sh base)
          sha=$(git rev-parse HEAD)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

  tests:
    name: Source quality gates
    needs: metadata
    uses: ./.github/workflows/tests.yml

  common-assets:
    name: Prepare common release assets
    needs:
      - metadata
      - tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.sha }}
          fetch-depth: 0
      - name: Prepare common assets
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          TAG: ${{ needs.metadata.outputs.tag }}
          SHA: ${{ needs.metadata.outputs.sha }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          RELEASE_RUN_ID: ${{ github.run_id }}
          RELEASE_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: scripts/release/common-assets.sh
      - uses: actions/upload-artifact@v7
        with:
          name: cup-release-common
          path: dist/common/*
          if-no-files-found: error
          retention-days: 30

  build-release:
    name: Build release (${{ matrix.platform }})
    needs:
      - metadata
      - tests
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
          - platform: windows-x64
            runner: windows-latest
            family: windows
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.sha }}
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        if: matrix.family == 'windows'
        with:
          msystem: UCRT64
          update: true
          install: >-
            ca-certificates
            curl
            diffutils
            file
            git
            make
            perl
            tar
            xz
            zip
          pacboy: >-
            gcc:p
            binutils:p
            pkgconf:p
      - name: Prepare POSIX release toolchain
        if: matrix.family != 'windows'
        env:
          FAMILY: ${{ matrix.family }}
          PLATFORM: ${{ matrix.platform }}
        run: scripts/ci/prepare-posix.sh release
      - id: cache-posix
        if: matrix.family != 'windows'
        run: |
          prefix="$HOME/deps/${{ matrix.platform }}/install"
          key=$(scripts/dependencies/verify.sh \
            '${{ matrix.platform }}' --print-cache-key)
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - id: cache-windows
        if: matrix.family == 'windows'
        shell: msys2 {0}
        env:
          CUP_DEPENDENCY_PROFILE: ucrt64-gcc
        run: |
          prefix="$HOME/deps/windows-x64/install"
          key=$(scripts/dependencies/verify.sh windows-x64 --print-cache-key)
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"
          echo "path=$(cygpath -m "$prefix")" >> "$GITHUB_OUTPUT"
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        if: matrix.family != 'windows'
        with:
          path: ${{ steps.cache-posix.outputs.prefix }}
          key: ${{ steps.cache-posix.outputs.key }}
          fail-on-cache-miss: true
      - uses: actions/cache@v5
        if: matrix.family == 'windows'
        with:
          path: ${{ steps.cache-windows.outputs.path }}
          key: ${{ steps.cache-windows.outputs.key }}
          fail-on-cache-miss: true
      - name: Build POSIX release
        if: matrix.family != 'windows'
        env:
          PLATFORM: ${{ matrix.platform }}
          FAMILY: ${{ matrix.family }}
          VERSION: ${{ needs.metadata.outputs.version }}
          TAG: ${{ needs.metadata.outputs.tag }}
          SHA: ${{ needs.metadata.outputs.sha }}
          CUP_CI_ENVIRONMENT_PREPARED: 1
          DEPS_PREFIX: ${{ steps.cache-posix.outputs.prefix }}
        run: scripts/release/build-platform.sh
      - name: Build POSIX release test helpers
        if: matrix.family != 'windows'
        env:
          DEPS_PREFIX: ${{ steps.cache-posix.outputs.prefix }}
        run: >-
          make PLATFORM='${{ matrix.platform }}'
          DEPS_PREFIX="$DEPS_PREFIX"
          CUP_TEST_CONFIGURATION=release test-helpers
      - name: Build Windows release
        if: matrix.family == 'windows'
        shell: msys2 {0}
        env:
          PLATFORM: windows-x64
          FAMILY: windows
          VERSION: ${{ needs.metadata.outputs.version }}
          TAG: ${{ needs.metadata.outputs.tag }}
          SHA: ${{ needs.metadata.outputs.sha }}
          CUP_DEPENDENCY_PROFILE: ucrt64-gcc
          DEPS_PREFIX: ${{ steps.cache-windows.outputs.prefix }}
        run: scripts/release/build-platform.sh
      - name: Build Windows release test helpers
        if: matrix.family == 'windows'
        shell: msys2 {0}
        env:
          CUP_DEPENDENCY_PROFILE: ucrt64-gcc
          DEPS_PREFIX: ${{ steps.cache-windows.outputs.prefix }}
        run: >-
          make PLATFORM=windows-x64 DEPS_PREFIX="$DEPS_PREFIX"
          CUP_TEST_CONFIGURATION=release test-helpers
      - uses: actions/upload-artifact@v7
        with:
          name: cup-release-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}/*
          if-no-files-found: error
          retention-days: 30
      - uses: actions/upload-artifact@v7
        with:
          name: cup-symbols-${{ matrix.platform }}
          path: dist/symbols/${{ matrix.platform }}/*
          if-no-files-found: error
          retention-days: 30
      - uses: actions/upload-artifact@v7
        with:
          name: cup-test-helpers-${{ matrix.platform }}
          path: build/${{ matrix.platform }}/release/tests/helpers/*
          if-no-files-found: error
          retention-days: 30

  native-release-tests:
    name: Native release tests (${{ matrix.platform }})
    needs:
      - metadata
      - common-assets
      - build-release
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: posix
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: posix
          - platform: macos-x64
            runner: macos-15-intel
            family: posix
          - platform: macos-arm64
            runner: macos-15
            family: posix
          - platform: windows-x64
            runner: windows-latest
            family: windows
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          pattern: cup-release-*
          path: release
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: cup-test-helpers-${{ matrix.platform }}
          path: build/${{ matrix.platform }}/release/tests/helpers
      - name: Restore POSIX helper permissions
        if: matrix.family == 'posix'
        run: chmod +x build/${{ matrix.platform }}/release/tests/helpers/*
      - name: Test POSIX release
        if: matrix.family == 'posix'
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ needs.metadata.outputs.version }}
          CUP_TEST_CONFIGURATION: release
        run: tests/release/posix.sh release
      - name: Test Windows release
        if: matrix.family == 'windows'
        shell: powershell
        env:
          CUP_TEST_CONFIGURATION: release
        run: >-
          powershell.exe -NoProfile -ExecutionPolicy Bypass
          -File tests/release/windows.ps1
          -ReleaseDir release
          -Version '${{ needs.metadata.outputs.version }}'

  publish:
    name: Publish verified release
    needs:
      - metadata
      - common-assets
      - build-release
      - native-release-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          pattern: cup-release-*
          path: candidate
          merge-multiple: true
      - name: Publish exact tested candidate
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          GH_REPO: coffee-clang/cup
          VERSION: ${{ needs.metadata.outputs.version }}
          TAG: ${{ needs.metadata.outputs.tag }}
          SHA: ${{ needs.metadata.outputs.sha }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          RELEASE_RUN_ID: ${{ github.run_id }}
          RELEASE_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: scripts/release/publish.sh candidate
