name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      release_needed: ${{ steps.prepare.outputs.release_needed }}
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}
      sha: ${{ steps.prepare.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: prepare
        run: scripts/tests/workflow/release-prepare.sh

  source-posix:
    name: Release source tests (${{ matrix.platform }})
    needs: prepare
    if: needs.prepare.outputs.release_needed == '1'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - name: Run source tests
        env:
          PLATFORM: ${{ matrix.platform }}
          FAMILY: ${{ matrix.family }}
        run: scripts/tests/workflow/source-posix.sh

  source-windows:
    name: Release source tests (windows-x64)
    needs: prepare
    if: needs.prepare.outputs.release_needed == '1'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            make
            perl
            uthash
          pacboy: >-
            gcc:p
            binutils:p
            curl:p
            libarchive:p
            argtable3:p
            pkgconf:p
      - name: Expose uthash to the MinGW compiler
        shell: msys2 {0}
        run: cp /usr/include/uthash.h /ucrt64/include/uthash.h
      - name: Run source tests
        shell: msys2 {0}
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/tests/workflow/source-windows.ps1

  common-assets:
    name: Prepare common release assets
    needs: [prepare, source-posix, source-windows]
    if: needs.prepare.outputs.release_needed == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - name: Prepare common assets
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: scripts/tests/workflow/release-common-assets.sh
      - uses: actions/upload-artifact@v7
        with:
          name: cup-common-release
          path: dist/common/*
          if-no-files-found: error
          retention-days: 7

  build:
    name: Build release asset (${{ matrix.platform }})
    needs: [prepare, source-posix, source-windows]
    if: needs.prepare.outputs.release_needed == '1'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
          - platform: windows-x64
            runner: ubuntu-latest
            family: windows
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - name: Build release asset
        env:
          PLATFORM: ${{ matrix.platform }}
          FAMILY: ${{ matrix.family }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: scripts/tests/workflow/release-build-platform.sh
      - uses: actions/upload-artifact@v7
        with:
          name: cup-${{ matrix.platform }}-release
          path: dist/${{ matrix.platform }}/*
          if-no-files-found: error
          retention-days: 7

  native-test:
    name: Test release asset (${{ matrix.platform }})
    needs: [prepare, common-assets, build]
    if: needs.prepare.outputs.release_needed == '1'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: posix
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: posix
          - platform: macos-x64
            runner: macos-15-intel
            family: posix
          - platform: macos-arm64
            runner: macos-15
            family: posix
          - platform: windows-x64
            runner: windows-latest
            family: windows
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          name: cup-common-release
          path: release
      - uses: actions/download-artifact@v7
        with:
          name: cup-${{ matrix.platform }}-release
          path: release
      - name: Test POSIX release candidate
        if: matrix.family == 'posix'
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: scripts/tests/release/posix.sh release
      - name: Test Windows release candidate
        if: matrix.family == 'windows'
        shell: powershell
        run: >-
          powershell.exe -NoProfile -ExecutionPolicy Bypass
          -File scripts/tests/release/windows.ps1
          -ReleaseDir release
          -Version '${{ needs.prepare.outputs.version }}'

  publish:
    name: Publish release
    needs: [prepare, native-test]
    if: needs.prepare.outputs.release_needed == '1'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
      SHA: ${{ needs.prepare.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          pattern: cup-*-release
          path: dist
          merge-multiple: true
      - name: Publish verified release
        run: scripts/tests/workflow/release-publish.sh dist
