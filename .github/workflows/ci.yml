name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  posix:
    name: Source tests (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run source tests
        env:
          PLATFORM: ${{ matrix.platform }}
          FAMILY: ${{ matrix.family }}
        run: scripts/tests/workflow/source-posix.sh

  windows:
    name: Source tests (windows-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            make
            perl
            uthash
          pacboy: >-
            gcc:p
            binutils:p
            curl:p
            libarchive:p
            argtable3:p
            pkgconf:p
      - name: Expose uthash to the MinGW compiler
        shell: msys2 {0}
        run: cp /usr/include/uthash.h /ucrt64/include/uthash.h
      - name: Run source tests
        shell: msys2 {0}
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/tests/workflow/source-windows.ps1
