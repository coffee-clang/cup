name: Build GNU package

on:
  workflow_dispatch:
    inputs:
      tool:
        description: "GNU tool to build"
        required: true
        type: choice
        options:
          - gcc
          - gdb

      version:
        description: "Version to build"
        required: true
        default: "15.2.0"

      build_mode:
        description: "Build mode"
        required: true
        type: choice
        default: "full"
        options:
          - minimal
          - standard
          - full

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Prepare release metadata
        id: meta
        env:
          TOOL: ${{ github.event.inputs.tool }}
          VERSION: ${{ github.event.inputs.version }}
          BUILD_MODE: ${{ github.event.inputs.build_mode }}
        run: |
          set -euo pipefail

          TAG="${TOOL}-${VERSION}-${BUILD_MODE}"
          TITLE="${TOOL^^} ${VERSION} (${BUILD_MODE})"
          PACKAGE_BASE="${TOOL}-${VERSION}-linux-x64-${BUILD_MODE}"
          ASSET_GZ="${PACKAGE_BASE}.tar.gz"
          ASSET_XZ="${PACKAGE_BASE}.tar.xz"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "package_base=${PACKAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "asset_gz=${ASSET_GZ}" >> "$GITHUB_OUTPUT"
          echo "asset_xz=${ASSET_XZ}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -f docker/gnu-builder.Dockerfile \
            -t cup-gnu-builder .

      - name: Run GNU build inside Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -e ROOT_DIR=/work \
            cup-gnu-builder \
            bash /work/scripts/build-gnu-package.sh \
              "${{ github.event.inputs.tool }}" \
              "${{ github.event.inputs.version }}" \
              "${{ github.event.inputs.build_mode }}"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          TITLE: ${{ steps.meta.outputs.title }}
          ASSET_GZ: ${{ steps.meta.outputs.asset_gz }}
          ASSET_XZ: ${{ steps.meta.outputs.asset_xz }}
          TOOL: ${{ github.event.inputs.tool }}
          VERSION: ${{ github.event.inputs.version }}
          BUILD_MODE: ${{ github.event.inputs.build_mode }}
        run: |
          set -euo pipefail

          NOTES="Precompiled ${TOOL} ${VERSION} built in ${BUILD_MODE} mode."

          if gh release view "${TAG}" --repo "${TARGET_REPO}" >/dev/null 2>&1; then
            gh release upload "${TAG}" \
              "out/${ASSET_GZ}" \
              "out/${ASSET_XZ}" \
              --repo "${TARGET_REPO}" \
              --clobber
          else
            gh release create "${TAG}" \
              "out/${ASSET_GZ}" \
              "out/${ASSET_XZ}" \
              --repo "${TARGET_REPO}" \
              --title "${TITLE}" \
              --notes "${NOTES}"
          fi