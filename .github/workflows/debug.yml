name: Debug artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cup-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependencies:
    name: Dependencies (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64-gcc
          - linux-arm64-gcc
          - macos-x64-apple-clang
          - macos-arm64-apple-clang
          - windows-x64-ucrt64
    uses: ./.github/workflows/dependencies.yml
    with:
      target: ${{ matrix.target }}

  posix:
    name: Debug build (${{ matrix.platform }})
    needs: dependencies
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            family: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            family: linux
          - platform: macos-x64
            runner: macos-15-intel
            family: macos
          - platform: macos-arm64
            runner: macos-15
            family: macos
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Prepare POSIX debug toolchain
        env:
          FAMILY: ${{ matrix.family }}
          PLATFORM: ${{ matrix.platform }}
        run: scripts/ci/prepare-posix.sh source
      - id: cache
        run: |
          prefix="$HOME/deps/${{ matrix.platform }}/install"
          key=$(scripts/dependencies/verify.sh \
            '${{ matrix.platform }}' --print-cache-key)
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        with:
          path: ${{ steps.cache.outputs.prefix }}
          key: ${{ steps.cache.outputs.key }}
          fail-on-cache-miss: true
      - name: Build diagnostic executable
        env:
          DEPS_PREFIX: ${{ steps.cache.outputs.prefix }}
        run: |
          make PLATFORM=${{ matrix.platform }} DEPS_PREFIX="$DEPS_PREFIX" debug
          make PLATFORM=${{ matrix.platform }} DEPS_PREFIX="$DEPS_PREFIX" \
            CUP_BUILD_CONFIGURATION=debug check-binary
      - name: Package debug information
        shell: bash
        env:
          DEPS_PREFIX: ${{ steps.cache.outputs.prefix }}
        run: |
          set -euo pipefail
          out="dist/debug/${{ matrix.platform }}"
          binary="build/${{ matrix.platform }}/debug/bin/cup"
          generated="build/${{ matrix.platform }}/debug/generated"
          mkdir -p "$out"
          cp "$binary" "$out/cup"
          cp "$generated/release.txt" "$out/release.txt"
          cp "build/${{ matrix.platform }}/debug/binary-inspection.txt" \
            "$out/binary-inspection.txt"
          if [ "${{ matrix.family }}" = macos ]; then
            compiler=clang
          else
            compiler=gcc
          fi
          make -B -n PLATFORM=${{ matrix.platform }} \
            DEPS_PREFIX="$DEPS_PREFIX" debug > "$out/rebuild-commands.txt"
          {
            echo "platform=${{ matrix.platform }}"
            echo "compiler=$($compiler --version | head -n 1)"
            echo "configuration=debug"
            echo "commit=${GITHUB_SHA}"
          } > "$out/build-info.txt"
          if [ "${{ matrix.family }}" = linux ]; then
            objcopy --only-keep-debug "$binary" "$out/cup.debug"
            readelf --debug-dump=info "$binary" >/dev/null
          else
            dsymutil "$binary" -o "$out/cup.dSYM"
            dwarfdump --verify "$out/cup.dSYM"
          fi
          file "$binary" > "$out/file.txt"
          tar -czf "dist/debug/cup-debug-${{ matrix.platform }}.tar.gz" \
            -C "$out" .
      - uses: actions/upload-artifact@v7
        with:
          name: cup-debug-${{ matrix.platform }}
          path: dist/debug/cup-debug-${{ matrix.platform }}.tar.gz
          if-no-files-found: error
          retention-days: 30

  windows:
    name: Debug build (windows-x64)
    needs: dependencies
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            ca-certificates
            curl
            diffutils
            file
            git
            make
            perl
            tar
            xz
          pacboy: >-
            gcc:p
            binutils:p
            pkgconf:p
      - id: cache
        shell: msys2 {0}
        env:
          CUP_DEPENDENCY_PROFILE: ucrt64-gcc
        run: |
          prefix="$HOME/deps/windows-x64/install"
          key=$(scripts/dependencies/verify.sh windows-x64 --print-cache-key)
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"
          echo "path=$(cygpath -m "$prefix")" >> "$GITHUB_OUTPUT"
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        with:
          path: ${{ steps.cache.outputs.path }}
          key: ${{ steps.cache.outputs.key }}
          fail-on-cache-miss: true
      - name: Build and package diagnostic executable
        shell: msys2 {0}
        env:
          CUP_DEPENDENCY_PROFILE: ucrt64-gcc
          DEPS_PREFIX: ${{ steps.cache.outputs.prefix }}
        run: |
          set -euo pipefail
          make PLATFORM=windows-x64 DEPS_PREFIX="$DEPS_PREFIX" debug
          make PLATFORM=windows-x64 DEPS_PREFIX="$DEPS_PREFIX" \
            CUP_BUILD_CONFIGURATION=debug check-binary
          out=dist/debug/windows-x64
          binary=build/windows-x64/debug/bin/cup.exe
          generated=build/windows-x64/debug/generated
          mkdir -p "$out"
          cp "$binary" "$out/cup.exe"
          cp "$generated/release.txt" "$out/release.txt"
          cp build/windows-x64/debug/binary-inspection.txt \
            "$out/binary-inspection.txt"
          objcopy --only-keep-debug "$binary" "$out/cup.debug"
          objdump -h "$binary" > "$out/sections.txt"
          file "$binary" > "$out/file.txt"
          make -B -n PLATFORM=windows-x64 debug > "$out/rebuild-commands.txt"
          {
            echo "platform=windows-x64"
            echo "compiler=$(gcc --version | head -n 1)"
            echo "configuration=debug"
            echo "commit=${GITHUB_SHA}"
          } > "$out/build-info.txt"
          tar -czf dist/debug/cup-debug-windows-x64.tar.gz -C "$out" .
      - uses: actions/upload-artifact@v7
        with:
          name: cup-debug-windows-x64
          path: dist/debug/cup-debug-windows-x64.tar.gz
          if-no-files-found: error
          retention-days: 30
