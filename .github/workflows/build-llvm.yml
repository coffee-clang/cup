name: Build LLVM tool (Linux)

on:
  workflow_dispatch:
    inputs:
      tool:
        description: LLVM tool to build
        required: true
        type: choice
        options:
          - clang
          - lld
          - lldb
          - clangd
          - clang-format
          - clang-tidy
      version:
        description: Tool version, or stable/latest
        required: true
        default: stable
      revision:
        description: Package revision metadata
        required: true
        default: '1'
      publish:
        description: Publish packages as GitHub Release assets
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -f docker/llvm-builder.Dockerfile -t cup-llvm-builder .

      - name: Build package
        run: |
          docker run --rm \
            -e CUP_BUILD_ENVIRONMENT=docker-llvm \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-llvm-builder \
            bash scripts/build-llvm-tool.sh \
              "${{ inputs.tool }}" \
              "${{ inputs.version }}" \
              linux-x64 \
              linux-x64 \
              "${{ inputs.revision }}"

      - name: Test packaged LLVM tool
        run: |
          docker run --rm \
            -e LLVM_TOOL="${{ inputs.tool }}" \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-llvm-builder \
            bash -lc '
              set -euo pipefail
              source dist/release.env

              rm -rf dist/package-test
              mkdir -p dist/package-test
              tar -xJf "dist/$package_base.tar.xz" -C dist/package-test

              root="dist/package-test/$package_base"

              case "$LLVM_TOOL" in
                clang)
                  "$root/bin/clang" --version
                  printf "%s\n" \
                    "#include <stdio.h>" \
                    "" \
                    "int main(void) {" \
                    "    printf(\"hello clang\\n\");" \
                    "    return 0;" \
                    "}" > /tmp/cup-clang-test.c
                  "$root/bin/clang" /tmp/cup-clang-test.c -o /tmp/cup-clang-test
                  /tmp/cup-clang-test | grep "hello clang"
                  ;;
                lld)
                  "$root/bin/lld" --version
                  "$root/bin/ld.lld" --version
                  ;;
                lldb)
                  "$root/bin/lldb" --version
                  ;;
                clangd)
                  "$root/bin/clangd" --version
                  printf "%s\n" \
                    "int main(void) {" \
                    "    return 0;" \
                    "}" > /tmp/cup-clangd-test.c
                  "$root/bin/clangd" --check=/tmp/cup-clangd-test.c
                  ;;
                clang-format)
                  "$root/bin/clang-format" --version
                  printf "%s\n" "int main( void ){return 0;}" > /tmp/cup-format-test.c
                  "$root/bin/clang-format" /tmp/cup-format-test.c | grep "int main"
                  ;;
                clang-tidy)
                  "$root/bin/clang-tidy" --version
                  printf "%s\n" \
                    "int main(void) {" \
                    "    return 0;" \
                    "}" > /tmp/cup-tidy-test.c
                  "$root/bin/clang-tidy" /tmp/cup-tidy-test.c -- -std=c11
                  ;;
                *)
                  echo "unsupported tool: $LLVM_TOOL" >&2
                  exit 2
                  ;;
              esac
            '

      - name: Load release metadata
        id: release
        shell: bash
        run: |
          source dist/release.env
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.tag }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip --clobber
          else
            gh release create "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --title "$tag" \
              --notes "Automated cup build for $tag"
          fi
